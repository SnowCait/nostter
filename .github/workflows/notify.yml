name: Notify

on:
  issues:
    types:
      opened
  pull_request_target:
    types:
      - closed
    branches:
      - main

jobs:
  notify-issue:
    if: ${{ github.event_name == 'issues' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - id: publish
        uses: snow-actions/nostr@v1.8.3
        with:
          relays: ${{ vars.NOSTR_RELAYS }}
          private-key: ${{ secrets.NOSTR_PRIVATE_KEY }}
          content: |
            Issue by @${{ github.event.sender.login }}: ${{ github.event.issue.title }}
            ${{ github.event.issue.html_url }} #nostter
          tags: |
            - ["t", "nostter"]
            - ["proxy", "${{ github.event.issue.html_url }}", "web"]
      - name: Post published event to proxy
        run: |
          curl -X PUT \
            -H 'Content-Type: application/json' \
            -d "$event" \
            "$PROXY_URL"
        env:
          event: ${{ steps.publish.outputs.event }}
          PROXY_URL: ${{ vars.NOSTR_PUBLISH_URL }}
  notify-pr:
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - id: publish
        uses: snow-actions/nostr@v1.8.3
        with:
          relays: ${{ vars.NOSTR_RELAYS }}
          private-key: ${{ secrets.NOSTR_PRIVATE_KEY }}
          content: |
            PR merged: ${{ github.event.pull_request.title }}
            ${{ github.event.pull_request.html_url }} #nostter
          tags: |
            - ["t", "nostter"]
            - ["proxy", "${{ github.event.pull_request.html_url }}", "web"]
      - name: Post published event to proxy
        run: |
          curl -X PUT \
            -H 'Content-Type: application/json' \
            -d "$event" \
            "$PROXY_URL"
        env:
          event: ${{ steps.publish.outputs.event }}
          PROXY_URL: ${{ vars.NOSTR_PUBLISH_URL }}
  user-status:
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - run: echo "expiration=$(date +%s --date '12 hours')" >> $GITHUB_ENV
      - id: publish
        uses: snow-actions/nostr@v1.8.3
        with:
          relays: ${{ vars.NOSTR_RELAYS }}
          private-key: ${{ secrets.NOSTR_PRIVATE_KEY }}
          kind: 30315
          content: |
            #nostter ${{ github.event.pull_request.title }}
          tags: |
            - ["d", "general"]
            - ["t", "nostter"]
            - ["r", "https://nostter.app/"]
            - ["expiration", "${{ env.expiration }}"]
      - name: Post published event to proxy
        run: |
          curl -X PUT \
            -H 'Content-Type: application/json' \
            -d "$event" \
            "$PROXY_URL"
        env:
          event: ${{ steps.publish.outputs.event }}
          PROXY_URL: ${{ vars.NOSTR_PUBLISH_URL }}
